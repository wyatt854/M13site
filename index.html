<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PROJECT M13 | MONITORING SYSTEM</title>
    
    <style>
        :root {
            --bg: #050505;
            --primary: #ffffff; 
            --accent: #ff3333; 
            --secondary: #33ff00; 
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .grid-bg {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                linear-gradient(rgba(51, 255, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 40s linear infinite;
            will-change: transform;
        }

        @keyframes grid-move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 10;
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; color: #fff; }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 5;
        }

        .main-nav {
            display: flex;
            gap: 15px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .char-card {
            width: 180px;
            height: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            text-decoration: none !important;
            color: #ffffff !important;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-size: cover;
            background-position: center;
            background-color: #111;
        }

        .char-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 10%, transparent 70%);
            z-index: 1;
        }

        .char-card h2 {
            font-size: 1.8rem;
            margin: 0;
            z-index: 2;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: color 0.3s;
        }

        .char-card span {
            font-size: 0.7rem;
            z-index: 2;
            font-family: monospace;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .char-card:hover {
            transform: scale(1.05);
            border-color: var(--secondary);
            box-shadow: 0 0 25px rgba(51, 255, 0, 0.3);
        }

        .char-card:hover h2 {
            color: var(--secondary);
        }

        /* Attribution des images */
        .card-darius { background-image: url('darius.png'); }
        .card-clara { background-image: url('clara.png'); }
        .card-alex { background-image: url('alex.png'); }
        .card-leroi { background-image: url('leroi.png'); }
        .card-elio { background-image: url('elio.png'); }
        .card-kayden { background-image: url('kayden.png'); }

        @media (max-width: 900px) {
            .main-nav {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .char-card {
                width: auto;
                height: 250px;
            }
            .char-card h2 {
                writing-mode: horizontal-tb;
                transform: none;
                font-size: 1.5rem;
            }
        }

        footer {
            padding: 15px;
            text-align: center;
            font-family: monospace;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
