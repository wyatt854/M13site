<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT M13 | GLOBAL MONITORING</title>
    <style>
        :root {
            --bg: #050505;
            --primary: #e0e0e0;
            --accent: #ff3333; 
            --secondary: #33ff00; 
            --glass: rgba(0, 0, 0, 0.6);
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* GRILLE DE FOND */
        .grid-bg {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                linear-gradient(rgba(51, 255, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 40s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 10;
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        .main-nav {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            z-index: 5;
        }

        /* CARTES AVEC IMAGES */
        .char-card {
            width: 180px;
            height: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            transition: 0.4s ease;
            background-size: cover;
            background-position: center;
        }

        /* Overlay sombre pour lire le texte */
        .char-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 20%, transparent 80%);
            z-index: 1;
        }

        .char-card:hover {
            transform: scale(1.05);
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(51, 255, 0, 0.2);
            z-index: 10;
        }

        .char-card h2 {
            font-size: 1.8rem;
            margin: 0;
            z-index: 2;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .char-card span {
            font-size: 0.7rem;
            z-index: 2;
            font-family: monospace;
            opacity: 0.7;
        }

        /* IMAGES SPECIFIQUES */
        .card-darius { background-image: url('darius.png'); }
        .card-clara { background-image: url('clara.png'); }
        .card-alex { background-image: url('alex.png'); }
        .card-kayden { background-image: url('kayden.png'); }
        .card-elio { background-image: url('elio.png'); }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .main-nav {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .char-card {
                width: auto;
                height: 200px;
                writing-mode: horizontal-tb;
            }
            .char-card h2 {
                writing-mode: horizontal-tb;
                transform: none;
                font-size: 1.2rem;
            }
            .char-card:last-child {
                grid-column: span 2;
                height: 120px;
            }
        }

        .intro-text {
            padding: 20px 30px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
            background: black;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <header>
        <h1>M13 // MONITORING</h1>
        <div style="font-family: monospace; font-size: 0.7rem; color: var(--secondary);">ONLINE</div>
    </header>

    <nav class="main-nav">
        <a href="/darius" class="char-card card-darius">
            <span>ID_01</span>
            <h2>DARIUS</h2>
        </a>
        <a href="/clara" class="char-card card-clara">
            <span>ID_02</span>
            <h2>CLARA</h2>
        </a>
        <a href="/alex" class="char-card card-alex">
            <span>ID_03</span>
            <h2>ALEX</h2>
        </a>
        <a href="/kayden" class="char-card card-kayden">
            <span>ID_04</span>
            <h2>KAYDEN</h2>
        </a>
        <a href="/elio" class="char-card card-elio">
            <span>ID_00</span>
            <h2>ELIO</h2>
        </a>
    </nav>

    <div class="intro-text">
        > SYSTÈME OPÉRATIONNEL. SÉLECTIONNEZ UN SUJET POUR ACCÉDER AUX MÉMOIRES.
    </div>

</body>
</html>
