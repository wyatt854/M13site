<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | PROJECT M13</title>
    <style>
        :root {
            --bg: #050505;
            --primary: #ffffff;
            --accent: #33ff00;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: var(--font-mono);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Effet scanline léger - Désactivé sur mobile lent pour la performance */
        @media (min-width: 768px) {
            body::before {
                content: " ";
                display: block;
                position: fixed;
                top: 0; left: 0; bottom: 0; right: 0;
                background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                            linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
                z-index: 100;
                background-size: 100% 4px, 3px 100%;
                pointer-events: none;
            }
        }

        .terminal-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
        }

        .status {
            color: var(--accent);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        /* Liens propres sans .html */
        .menu-item {
            border: 1px solid #333;
            padding: 20px;
            text-decoration: none;
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
        }

        .menu-item:hover {
            border-color: var(--accent);
            background: rgba(51, 255, 0, 0.05);
            color: var(--accent);
        }

        .menu-item span {
            font-size: 0.7rem;
            display: block;
            opacity: 0.5;
            margin-bottom: 5px;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.6rem;
            opacity: 0.3;
            text-align: center;
        }

        /* Glitch simple au hover */
        .menu-item:active::after {
            content: "DECODING...";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr;
                max-width: 800px;
            }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <h1>PROJECT M13</h1>
        <div class="status">> SYSTEM_ACCESS: GRANTED | SUBJECTS_FOUND: 5</div>
    </div>

    <nav class="menu-grid">
        <a href="/darius" class="menu-item">
            <span>SUJET_01</span>
            DARIUS
        </a>
        <a href="/clara" class="menu-item">
            <span>SUJET_02</span>
            CLARA
        </a>
        <a href="/alex" class="menu-item">
            <span>SUJET_03</span>
            ALEX
        </a>
        <a href="/kayden" class="menu-item">
            <span>SUJET_04</span>
            KAYDEN
        </a>
        <a href="/elio" class="menu-item" style="grid-column: span 1;">
            <span>SUJET_00</span>
            ELIO
        </a>
    </nav>

    <div class="footer">
        © 2026 M13_OPERATING_SYSTEM | ALL_RECORDS_CONFIDENTIAL
    </div>

</body>
</html>
